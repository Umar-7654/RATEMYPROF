<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
    <title>Login</title>
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/png" href="img/graduation.png">
</head>
<body>
    <a href="homepage.html" id="home-logo">
        <img src="img/graduation-blue.png" alt="RateMyAUSProf logo">
    </a>
<div id="background-overlay"></div>
<div id="login-box">
    <h1>LOG IN</h1>

<form action="login" method="post">
    <input type="email" name="email" placeholder="AUS Email" id="emailll" required>
    <input type="password" name="password" placeholder="Password" id="passworddd" required>

    <button type="submit" id="login-button">LOG IN</button>
</form>

    <p id="signup-text">
        <a href="signup.html">Don't have an account?</a>
    </p>
</div>
</body>

</html>
