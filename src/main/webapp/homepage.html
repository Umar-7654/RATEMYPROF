<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" >
        <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Belanosima:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/homepage.css">
    <link rel="icon" type="image/png" href="img/graduation.png">
    
    <title>RateMyAUSProf</title>
</head>
<body>
    <a href="#AUS_MainBuilding" id="home-logo">
        <img src="img/graduation.png" alt="RateMyAUSProf logo">
    </a>
    <div class="container-fluid p-0">
        <div class="row">
            <div class="col-12" id="AUS_MainBuilding">
                <div id="login-area">
                    <a href="login.html" class="login-link">log in</a>
                    <a href="signup.html" class="login-link">sign up</a>
                </div>
                <h1 id="main-title">RATE <span style="font-size: 5vh;">my</span> AUS PROF</h1>
                <div id="find-button-area">
                    <a href="#search-sections">
                        <img src="img/search-button.png" id="find-button" alt="Find Your Professor">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="search-sections" class="container-fluid">
         <div class="row">
            <div class="col-12 section-box" id="name-section">
                <div class="container py-5">
                    <h2 class="section-title">⌕ Search by Name</h2>
                    <div id="search-name-area">
                        <input type="text" id="search-name-box" placeholder="Search for a professor by name">
					    <div id="search-results">
					    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="row">
            <div class="col-12 section-box" id="department-section">
            <div class="container py-5">
                <h2 class="section-title">⌕ Search by Department</h2>
                <div class="row g-4">

                    <div class="col-lg-3 col-md-6">
                        <a href="department.html?dept=SBA" class="department-link">
                            <div class="department-card">
                                <img src="img/aus-sba2.png" alt="SBA" class="img-fluid">
                                <h3>SBA</h3>
                            </div>
                        </a>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <a href="department.html?dept=CAAD" class="department-link">
                            <div class="department-card">
                                <img src="img/aus-caad.jpeg" alt="CAAD" class="img-fluid">
                                <h3>CAAD</h3>
                            </div>
                        </a>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <a href="department.html?dept=CEN" class="department-link">
                            <div class="department-card">
                                <img src="img/aus-cen.jpeg" alt="CEN" class="img-fluid">
                                <h3>CEN</h3>
                            </div>
                        </a>
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <a href="department.html" class="department-link">
                            <div class="department-card">
                                <img src="img/aus-lobby.jpg" alt="All Departments" class="img-fluid">
                                <h3>All Departments</h3>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="main-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6 footer-section">
                    <h4>RateMyAUSProf</h4>
                    <p>Helping AUS students find and rate professors more easily.</p>
                </div>
                <div class="col-md-6 footer-section">
                    <h4>Quick Links</h4>
                    <a href="homepage.html">Home</a><br>
                    <a href="homepage.html#search-sections">Search</a><br>
                    <a href="#">Departments</a>
                </div>
            </div>
            <hr>
            <p id="footer-bottom">&copy; 2026 RateMyAUSProf. All rights reserved.</p>
        </div>
    </footer>

<script src="js/homepage.js"></script>
</body>
</html>
