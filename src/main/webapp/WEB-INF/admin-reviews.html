<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RateMyAUSProf — Manage Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/department.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
    
</head>

<body>


	<nav id="global-navbar">
	    <a href="homepage.html" id="global-logo">
	        <img src="img/graduation.png" alt="RateMyAUSProf logo">
	        <span>RateMyAUSProf</span>
	    </a>
	
	    <div id="global-login-area">
	        <a href="login.html" class="global-login-link">log in</a>
	        <a href="signup.html" class="global-login-link">sign up</a>
	    </div>
	</nav>

    <div id="admin-nav">
        <div class="container">
            <a href="admin-departments" class="admin-nav-link">Manage Departments</a>
            <a href="admin-professors" class="admin-nav-link ">Manage Professors</a>
            <a href="admin-users" class="admin-nav-link ">Manage Users</a>
            <a href="admin-reviews" class="admin-nav-link active">Manage Reviews</a>
        </div>
    </div>

<div class="container py-5">
    <h2>Manage Reviews</h2>

    <p id="reviews-loading">Loading reviews...</p>

    <div id="reviews-table-wrapper" class="d-none">
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Professor</th>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Rating</th>
                    <th>Difficulty</th>
                    <th>Review</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="reviews-tbody">
            </tbody>
        </table>
    </div>
</div>

<footer id="main-footer">
    <div class="container">
        <p id="footer-bottom">© 2026 RateMyAUSProf. All rights reserved.</p>
    </div>
</footer>
	<script src="js/global.js"></script>
<script src="js/admin-reviews.js"></script>

</body>
</html>
