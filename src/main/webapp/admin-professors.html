<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/department.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" type="image/png" href="img/graduation.png">
    <title>RateMyAUSProf — Manage Professors</title>
</head>
<body>

    <nav id="dept-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="homepage.html" class="navbar-brand-link">
                <h1 id="navbar-title">RATE <span style="font-size: 1.2rem;">my</span> AUS PROF</h1>
            </a>
        </div>
    </nav>

    <div id="admin-nav">
        <div class="container">
            <a href="admin-departments.html" class="admin-nav-link">Manage Departments</a>
            <a href="admin-professors.html" class="admin-nav-link active">Manage Professors</a>
        </div>
    </div>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="admin-page-title mb-0">Manage Professors</h2>
            <button class="btn admin-btn" id="add-prof-btn" data-bs-toggle="modal" data-bs-target="#prof-modal">+ Add Professor</button>
        </div>

        <div class="mb-4">
            <label for="dept-picker" class="form-label">Select Department</label>
            <select id="dept-picker" class="form-select admin-select">
                <option value="">— select a department —</option>
            </select>
        </div>

        <div id="prof-loading" class="text-center py-4 d-none">Loading professors…</div>

        <div class="table-responsive d-none" id="prof-table-wrapper">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Rating</th>
                        <th>Reviews</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="prof-tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="prof-modal" tabindex="-1" aria-labelledby="prof-modal-label" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content admin-modal-content">
                <div class="modal-header admin-modal-header">
                    <h5 class="modal-title" id="prof-modal-label">Add Professor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="prof-form">
                        <input type="hidden" id="prof-edit-mode" value="add">
                        <div class="mb-3">
                            <label for="prof-id-input" class="form-label">ID</label>
                            <input type="text" class="form-control admin-input" id="prof-id-input" placeholder="e.g. p_cen_6" required>
                        </div>
                        <div class="mb-3">
                            <label for="prof-name-input" class="form-label">Name</label>
                            <input type="text" class="form-control admin-input" id="prof-name-input" placeholder="e.g. Dr. Jane Smith" required>
                        </div>
                        <div class="mb-3">
                            <label for="prof-gender-input" class="form-label">Gender</label>
                            <select class="form-select admin-input" id="prof-gender-input" required>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="prof-rating-input" class="form-label">Rating (0–5)</label>
                            <input type="number" class="form-control admin-input" id="prof-rating-input" min="0" max="5" step="0.1" required>
                        </div>
                        <div class="mb-3">
                            <label for="prof-reviews-input" class="form-label">Reviews</label>
                            <input type="number" class="form-control admin-input" id="prof-reviews-input" min="0" step="1" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer admin-modal-footer">
                    <button type="button" class="btn admin-btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn admin-btn" id="prof-save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="main-footer">
        <div class="container">
            <div class="row">
                <div class="col-md-6 footer-section">
                    <h4>RateMyAUSProf</h4>
                    <p>Helping AUS students find and rate professors more easily.</p>
                </div>
                <div class="col-md-6 footer-section">
                    <h4>Quick Links</h4>
                    <a href="homepage.html">Home</a><br>
                    <a href="department.html">Departments</a>
                </div>
            </div>
            <hr>
            <p id="footer-bottom">&copy; 2026 RateMyAUSProf. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-professors.js" defer></script>
</body>
</html>
